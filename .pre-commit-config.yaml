repos:
  - repo: local
    hooks:
      - id: case-consistency
        name: case consistency
        entry: node scripts/check-case-consistency.mjs
        language: system
        pass_filenames: false
        always_run: true
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
