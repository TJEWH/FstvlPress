<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%APP_DISPLAY_NAME%</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Runtime config (generated by docker-entrypoint.sh, optional for dev) -->
    <script src="/config.js"></script>
    <script>
      (function () {
        var configuredName = window.APP_CONFIG && window.APP_CONFIG.APP_DISPLAY_NAME;
        var appDisplayName = String(configuredName || "").trim();
        if (appDisplayName) document.title = appDisplayName;
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
