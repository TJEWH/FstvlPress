# Docker Compose for Local Keycloak Only
# 
# Use this when you already have MongoDB and MinIO running locally,
# and just want to add Keycloak for testing authentication.
#
# Usage:
#   docker compose -f docker-compose.keycloak-only.yml up -d
#
# Test users:
#   - admin@example.local / admin123 (admin + editor roles)
#   - editor@example.local / editor123 (editor role)
#   - viewer@example.local / viewer123 (viewer role)

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fstvlpress-keycloak-local
    command:
      - start-dev
      - --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${LOCAL_KEYCLOAK_ADMIN_PASSWORD:-local-admin-password}
      - KC_HTTP_PORT=8180
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_LOG_LEVEL=INFO
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak-local/realm-local.json:/opt/keycloak/data/import/realm-local.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
