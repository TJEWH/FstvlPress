name: Case Consistency

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  case-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run case consistency guard
        run: node scripts/check-case-consistency.mjs
